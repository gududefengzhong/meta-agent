# Alembic configuration for meta-agent.
#
# Database connectivity is sourced from META_AGENT_DB_URL
# (see migrations/env.py); keep this file free of hard-coded DSNs.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
timezone = UTC
version_path_separator = os

# CLI slug formatting; informational only.
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
