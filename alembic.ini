# Alembic configuration for meta-agent.
#
# 数据库连接默认从环境变量 META_AGENT_DB_URL 读取（见 migrations/env.py）；
# 此处仅留通用配置，不在配置文件中硬编码任何连接信息。

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
timezone = UTC
version_path_separator = os

# 命令行回显风格（不影响逻辑）。
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
